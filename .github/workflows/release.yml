name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v2.1.3)'
        required: true
        default: 'v2.1.3'

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libboost-all-dev libssl-dev \
            libdb++-dev libminiupnpc-dev qt5-qmake qtbase5-dev \
            qttools5-dev-tools libqt5gui5 libqt5core5a libqt5dbus5 \
            libqrencode-dev

      - name: Build LevelDB
        run: |
          cd src/leveldb
          make libleveldb.a libmemenv.a

      - name: Build 8bitd (daemon)
        run: |
          cd src
          mkdir -p obj/crypto
          make -f makefile.unix -j$(nproc)
          strip 8bitd

      - name: Build 8bit-qt (GUI wallet)
        run: |
          qmake 8bit.pro "USE_UPNP=-" "USE_QRCODE=1"
          make -j$(nproc)
          strip 8bit-qt

      - name: Package Linux release
        run: |
          mkdir -p 8bit-linux-x86_64
          cp 8bit-qt 8bit-linux-x86_64/
          cp src/8bitd 8bit-linux-x86_64/
          cp COPYING 8bit-linux-x86_64/
          tar czf 8bit-linux-x86_64.tar.gz 8bit-linux-x86_64/

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: 8bit-linux-x86_64
          path: 8bit-linux-x86_64.tar.gz

  build-windows:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential g++-mingw-w64-x86-64 \
            mingw-w64-x86-64-dev autoconf libtool pkg-config \
            qttools5-dev-tools

      - name: Cache Windows dependencies
        uses: actions/cache@v4
        id: win-deps-cache
        with:
          path: /tmp/win-prefix
          key: win-deps-v3-${{ runner.os }}

      - name: Build Windows dependencies
        if: steps.win-deps-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          CROSS=x86_64-w64-mingw32
          PREFIX=/tmp/win-prefix
          mkdir -p $PREFIX/lib $PREFIX/include

          # OpenSSL 1.1.1
          cd /tmp
          wget -q https://www.openssl.org/source/openssl-1.1.1w.tar.gz
          tar xzf openssl-1.1.1w.tar.gz
          cd openssl-1.1.1w
          ./Configure mingw64 --cross-compile-prefix=$CROSS- --prefix=$PREFIX no-shared no-tests
          make -j$(nproc)
          make install_sw

          # Berkeley DB 5.3
          cd /tmp
          wget -q https://download.oracle.com/berkeley-db/db-5.3.28.tar.gz
          tar xzf db-5.3.28.tar.gz
          cd db-5.3.28
          sed -i 's/#include <WinIoCtl.h>/#include <winioctl.h>/g' src/dbinc/win_db.h
          cd build_unix
          ../dist/configure --host=$CROSS --prefix=$PREFIX --enable-mingw \
            --enable-cxx --disable-shared --disable-replication
          make -j$(nproc)
          make install

          # Boost 1.83
          cd /tmp
          wget -q https://archives.boost.io/release/1.83.0/source/boost_1_83_0.tar.gz
          tar xzf boost_1_83_0.tar.gz
          cd boost_1_83_0
          echo "using gcc : mingw : $CROSS-g++ ;" > user-config.jam
          ./bootstrap.sh
          ./b2 --user-config=user-config.jam toolset=gcc-mingw target-os=windows \
            address-model=64 variant=release link=static runtime-link=static \
            threading=multi threadapi=win32 \
            --with-system --with-filesystem --with-program_options --with-thread --with-chrono \
            --prefix=$PREFIX install -j$(nproc) || true

          # Qt 5.15 (static, cross-compiled)
          cd /tmp
          wget -q https://download.qt.io/archive/qt/5.15/5.15.12/submodules/qtbase-everywhere-opensource-src-5.15.12.tar.xz
          tar xJf qtbase-everywhere-opensource-src-5.15.12.tar.xz
          cd qtbase-everywhere-src-5.15.12
          ./configure -prefix $PREFIX/qt5 \
            -xplatform win32-g++ \
            -device-option CROSS_COMPILE=$CROSS- \
            -opensource -confirm-license \
            -release -static -no-shared \
            -no-opengl -no-dbus -no-icu -no-feature-sql \
            -no-feature-testlib -no-feature-concurrent \
            -nomake examples -nomake tests \
            -openssl-linked \
            -I $PREFIX/include -L $PREFIX/lib \
            OPENSSL_LIBS="-lssl -lcrypto -lws2_32 -lgdi32 -lcrypt32"
          make -j$(nproc)
          make install

          # Qt5 tools (lrelease, etc.)
          cd /tmp
          wget -q https://download.qt.io/archive/qt/5.15/5.15.12/submodules/qttools-everywhere-opensource-src-5.15.12.tar.xz
          tar xJf qttools-everywhere-opensource-src-5.15.12.tar.xz
          cd qttools-everywhere-src-5.15.12
          $PREFIX/qt5/bin/qmake
          make -j$(nproc)
          make install

      - name: Build LevelDB for Windows
        run: |
          cd src/leveldb
          CC=x86_64-w64-mingw32-gcc CXX=x86_64-w64-mingw32-g++ \
            TARGET_OS=NATIVE_WINDOWS make libleveldb.a libmemenv.a \
            OPT="-DOS_WINDOWS -I/tmp/win-prefix/include"

      - name: Build 8bitd.exe (daemon)
        run: |
          cd src
          sed -i "s|PREFIX=.*|PREFIX=/tmp/win-prefix|" makefile.mingw-cross
          make -f makefile.mingw-cross -j$(nproc)
          x86_64-w64-mingw32-strip 8bitd.exe

      - name: Build 8bit-qt.exe (GUI wallet)
        run: |
          PREFIX=/tmp/win-prefix
          export PATH="$PREFIX/qt5/bin:$PATH"

          # Boost was built without -mt suffix; create symlinks for the .pro file
          cd $PREFIX/lib
          for lib in system filesystem program_options thread chrono; do
            [ -f "libboost_${lib}.a" ] && [ ! -f "libboost_${lib}-mt.a" ] && \
              ln -sf "libboost_${lib}.a" "libboost_${lib}-mt.a" || true
          done
          cd -

          $PREFIX/qt5/bin/qmake 8bit.pro \
            "USE_UPNP=-" \
            "USE_QRCODE=0" \
            "BDB_INCLUDE_PATH=$PREFIX/include" \
            "BDB_LIB_PATH=$PREFIX/lib" \
            "BOOST_INCLUDE_PATH=$PREFIX/include" \
            "BOOST_LIB_PATH=$PREFIX/lib" \
            "OPENSSL_INCLUDE_PATH=$PREFIX/include" \
            "OPENSSL_LIB_PATH=$PREFIX/lib" \
            "BOOST_LIB_SUFFIX=" \
            "BOOST_THREAD_LIB_SUFFIX=" \
            "QMAKE_LRELEASE=/usr/bin/lrelease"

          make -j$(nproc)
          x86_64-w64-mingw32-strip release/8bit-qt.exe 2>/dev/null || \
            x86_64-w64-mingw32-strip 8bit-qt.exe 2>/dev/null || true

      - name: Package Windows release
        run: |
          mkdir -p 8bit-win64
          cp src/8bitd.exe 8bit-win64/
          cp release/8bit-qt.exe 8bit-win64/ 2>/dev/null || \
            cp 8bit-qt.exe 8bit-win64/ 2>/dev/null || true
          cp COPYING 8bit-win64/
          zip -r 8bit-win64.zip 8bit-win64/

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: 8bit-win64
          path: 8bit-win64.zip

  build-macos:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install boost openssl@1.1 berkeley-db@4 qt@5 miniupnpc qrencode pkg-config

      - name: Build LevelDB
        run: |
          cd src/leveldb
          make libleveldb.a libmemenv.a

      - name: Set up dependency paths
        id: deps
        run: |
          echo "OPENSSL_PREFIX=$(brew --prefix openssl@1.1)" >> $GITHUB_OUTPUT
          echo "BDB_PREFIX=$(brew --prefix berkeley-db@4)" >> $GITHUB_OUTPUT
          echo "BOOST_PREFIX=$(brew --prefix boost)" >> $GITHUB_OUTPUT
          echo "QT_PREFIX=$(brew --prefix qt@5)" >> $GITHUB_OUTPUT
          echo "HOMEBREW_PREFIX=$(brew --prefix)" >> $GITHUB_OUTPUT

      - name: Create unified deps prefix
        run: |
          mkdir -p /tmp/deps/lib /tmp/deps/include

          # Symlink keg-only packages into a single prefix the makefiles can use
          OPENSSL_PREFIX="${{ steps.deps.outputs.OPENSSL_PREFIX }}"
          BDB_PREFIX="${{ steps.deps.outputs.BDB_PREFIX }}"
          BOOST_PREFIX="${{ steps.deps.outputs.BOOST_PREFIX }}"
          HOMEBREW_PREFIX="${{ steps.deps.outputs.HOMEBREW_PREFIX }}"

          # BDB headers and libs
          ln -sf "$BDB_PREFIX"/include/* /tmp/deps/include/
          ln -sf "$BDB_PREFIX"/lib/* /tmp/deps/lib/

          # Create db48 subdirs that makefile.osx expects
          mkdir -p /tmp/deps/include/db48 /tmp/deps/lib/db48
          ln -sf "$BDB_PREFIX"/include/* /tmp/deps/include/db48/
          ln -sf "$BDB_PREFIX"/lib/* /tmp/deps/lib/db48/

          # OpenSSL
          ln -sf "$OPENSSL_PREFIX"/include/openssl /tmp/deps/include/
          ln -sf "$OPENSSL_PREFIX"/lib/lib*.a /tmp/deps/lib/

          # Boost
          ln -sf "$BOOST_PREFIX"/include/boost /tmp/deps/include/
          ln -sf "$BOOST_PREFIX"/lib/libboost_*.a /tmp/deps/lib/
          ln -sf "$BOOST_PREFIX"/lib/libboost_*.dylib /tmp/deps/lib/ 2>/dev/null || true

          # qrencode and miniupnpc from main homebrew prefix
          ln -sf "$HOMEBREW_PREFIX"/include/qrencode.h /tmp/deps/include/ 2>/dev/null || true
          ln -sf "$HOMEBREW_PREFIX"/lib/libqrencode* /tmp/deps/lib/ 2>/dev/null || true
          ln -sf "$HOMEBREW_PREFIX"/include/miniupnpc /tmp/deps/include/ 2>/dev/null || true
          ln -sf "$HOMEBREW_PREFIX"/lib/libminiupnpc* /tmp/deps/lib/ 2>/dev/null || true

      - name: Build 8bitd (daemon)
        run: |
          cd src
          mkdir -p obj/crypto

          make -f makefile.osx -j$(sysctl -n hw.ncpu) \
            DEPSDIR="/tmp/deps" \
            STATIC=1 \
            CXX=g++

          strip 8bitd

      - name: Build 8bit-qt (GUI wallet)
        run: |
          QT_PREFIX="${{ steps.deps.outputs.QT_PREFIX }}"
          OPENSSL_PREFIX="${{ steps.deps.outputs.OPENSSL_PREFIX }}"
          BDB_PREFIX="${{ steps.deps.outputs.BDB_PREFIX }}"
          BOOST_PREFIX="${{ steps.deps.outputs.BOOST_PREFIX }}"
          HOMEBREW_PREFIX="${{ steps.deps.outputs.HOMEBREW_PREFIX }}"

          export PATH="$QT_PREFIX/bin:$PATH"

          qmake 8bit.pro \
            "USE_UPNP=-" \
            "USE_QRCODE=1" \
            "OPENSSL_INCLUDE_PATH=$OPENSSL_PREFIX/include" \
            "OPENSSL_LIB_PATH=$OPENSSL_PREFIX/lib" \
            "BDB_INCLUDE_PATH=$BDB_PREFIX/include" \
            "BDB_LIB_PATH=$BDB_PREFIX/lib" \
            "BOOST_INCLUDE_PATH=$BOOST_PREFIX/include" \
            "BOOST_LIB_PATH=$BOOST_PREFIX/lib" \
            "QRENCODE_INCLUDE_PATH=$HOMEBREW_PREFIX/include" \
            "QRENCODE_LIB_PATH=$HOMEBREW_PREFIX/lib"

          make -j$(sysctl -n hw.ncpu)
          strip 8Bit-Qt.app/Contents/MacOS/8Bit-Qt 2>/dev/null || strip 8bit-qt 2>/dev/null || true

      - name: Package macOS release
        run: |
          mkdir -p 8bit-macos-x86_64
          if [ -d "8Bit-Qt.app" ]; then
            cp -R 8Bit-Qt.app 8bit-macos-x86_64/
          fi
          if [ -f "8bit-qt" ] && [ ! -d "8Bit-Qt.app" ]; then
            cp 8bit-qt 8bit-macos-x86_64/
          fi
          cp src/8bitd 8bit-macos-x86_64/
          cp COPYING 8bit-macos-x86_64/
          tar czf 8bit-macos-x86_64.tar.gz 8bit-macos-x86_64/

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: 8bit-macos-x86_64
          path: 8bit-macos-x86_64.tar.gz

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-22.04
    if: always() && (needs.build-linux.result == 'success' || needs.build-windows.result == 'success') && (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifact
        if: needs.build-linux.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: 8bit-linux-x86_64

      - name: Download Windows artifact
        if: needs.build-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: 8bit-win64

      - name: Download macOS artifact
        if: needs.build-macos.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: 8bit-macos-x86_64

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Collect release files
        id: files
        run: |
          FILES=""
          [ -f "8bit-linux-x86_64.tar.gz" ] && FILES="$FILES 8bit-linux-x86_64.tar.gz"
          [ -f "8bit-win64.zip" ] && FILES="$FILES 8bit-win64.zip"
          [ -f "8bit-macos-x86_64.tar.gz" ] && FILES="$FILES 8bit-macos-x86_64.tar.gz"
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "8BIT ${{ steps.version.outputs.tag }}"
          body: |
            ## 8BIT ${{ steps.version.outputs.tag }}

            ### Downloads
            - **Linux (x86_64)**: `8bit-linux-x86_64.tar.gz` — GUI wallet (`8bit-qt`) and daemon (`8bitd`)
            - **Windows (x64)**: `8bit-win64.zip` — GUI wallet (`8bit-qt.exe`) and daemon (`8bitd.exe`)
            - **macOS (x86_64)**: `8bit-macos-x86_64.tar.gz` — GUI wallet (`8Bit-Qt`) and daemon (`8bitd`)

            ### Network Info
            - Algorithm: Scrypt (PoW) + Proof of Stake
            - Block Time: ~64 seconds
            - Default Port: 18888 / RPC Port: 18889
          files: ${{ steps.files.outputs.files }}
          draft: false
          prerelease: false
